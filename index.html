<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>احنا</title>
    <style>
        body { background-color: #000000; color: #ffffff; text-align: center; font-family: 'Cairo', sans-serif; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; }
        .title { font-size: 50px; font-weight: bold; margin-bottom: 20px; }
    </style>
</head>
<body onclick="playMusic()">
    <div class="title">احنا</div>
    <p>اضغط في أي مكان لتشغيل الأغنية</p>
    <audio id="myAudio" src="music.mp3"></audio>

    <script>
        function playMusic() {
            var audio = document.getElementById("myAudio");
            audio.play();
        }
    </script>
</body>
</html>
